name: Pull request workflow

on:
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  paths-filter:
    name: Verify targets to run tests
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
      - name: Check for file changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            app:
              - 'Projects/App/**'
            dependency_injection:
              - 'Projects/DependencyInjection/**'
            design_system:
              - 'Projects/DesignSystem/**'
            home:
              - 'Projects/Home/**'
            detail:
              - 'Projects/Detail/**'
      - name: Generate matrix
        id: matrix
        run: |
          targets=()
          if [ "${{ steps.filter.outputs.app }}" == "true" ]; then
            targets+=("App")
          fi

          if [ "${{ steps.filter.outputs.dependency_injection }}" == "true" ]; then
            targets+=("DependencyInjection")
          fi

          if [ "${{ steps.filter.outputs.design_system }}" == "true" ]; then
            targets+=("DesignSystem")
          fi

          if [ "${{ steps.filter.outputs.home }}" == "true" ]; then
            targets+=("Home")
          fi

          if [ "${{ steps.filter.outputs.detail }}" == "true" ]; then
            targets+=("Detail")
          fi
          
          if [ ${#targets[@]} -gt 0 ]; then
            matrix="{\"target\": [$(printf '"%s",' "${targets[@]}" | sed 's/,$//')]}"
          else
            matrix='{"target": []}'
          fi
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
  
  test:
    name: Test ${{ matrix.target }}
    runs-on: macos-26
    needs: paths-filter
    if: fromJson(needs.paths-filter.outputs.matrix).target[0] != null
    strategy:
      matrix: ${{ fromJson(needs.paths-filter.outputs.matrix) }}
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
      - name: CI Setup
        run: make ci-setup
      - name: Install dependencies
        run: tuist install
      - name: Generate project
        run: tuist generate --no-open
      - name: Run tests for ${{ matrix.target }}
        run: exec fastlane tests target:${{ matrix.target }}
      - name: Generate code coverage
        run: fastlane tests_coverage target:${{ matrix.target }}
      - name: Zip reports
        run: zip -r reports-${{ matrix.target }}.zip reports-${{ matrix.target }}/test_output/
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.target }}
          path: reports-${{ matrix.target }}.zip

  danger:
    name: Danger Code Review
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    permissions:
      pull-requests: write
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 100
      - name: Download All Coverage Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: test-reports-*
          merge-multiple: true
      - name: Unzip reports
        run: cd all-reports && unzip "*.zip"
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-with: local
      - uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile') }} # change your gemfile path
          restore-keys: |
            ${{ runner.os }}-gems-
      - name: Run Danger
        uses: MeilCli/danger-action@v6
        with:
          plugins_file: 'Gemfile'
          install_path: 'vendor/bundle'
          danger_file: 'Dangerfile'
          danger_id: 'danger-pr'
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-project:
    name: Check project generation
    runs-on: macos-26
    needs: paths-filter
    if: fromJson(needs.paths-filter.outputs.matrix).target[0] == null
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
      - name: CI Setup
        run: make ci-setup
      - name: Install dependencies
        run: tuist install
      - name: Check project generation
        run: tuist generate --no-open